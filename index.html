<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixture — Copa Mundial Repsol</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  .tabs { display: flex; gap: 6px; justify-content: center; padding: 10px; background: #0a1628; flex-shrink: 0; }
  .tab-btn { background: #132040; color: #aabbcc; border: 1px solid #1e3060; border-radius: 8px; padding: 8px 20px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
  .tab-btn:hover { background: #1e3060; color: #fff; }
  .tab-btn.active { background: #ff6b00; border-color: #ff6b00; color: #fff; font-weight: 600; }

  .canvas-wrap { flex: 1; display: none; align-items: center; justify-content: center; background: #000; overflow: hidden; }
  .canvas-wrap.active { display: flex; }
  canvas { max-width: 100%; max-height: 100%; display: block; object-fit: contain; }

  #btn-dl { position: fixed; bottom: 14px; right: 14px; background: rgba(0,0,0,0.65); color: #ff6b00; border: 1px solid #ff6b00; border-radius: 8px; padding: 8px 16px; font-size: 0.82rem; font-weight: 600; cursor: pointer; z-index: 10; }
  #btn-dl:hover { background: #ff6b00; color: #fff; }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab(event,'futbol-masc')">Fútbol Masculino</button>
  <button class="tab-btn" onclick="switchTab(event,'voley')">Vóley Mixto</button>
  <button class="tab-btn" onclick="switchTab(event,'padel')">Pádel</button>
  <button class="tab-btn" onclick="switchTab(event,'futbol-fem')">Fútbol Femenino</button>
</div>

<div class="canvas-wrap active" id="wrap-futbol-masc"><canvas id="canvas-futbol-masc"></canvas></div>
<div class="canvas-wrap" id="wrap-voley"><canvas id="canvas-voley"></canvas></div>
<div class="canvas-wrap" id="wrap-padel"><canvas id="canvas-padel"></canvas></div>
<div class="canvas-wrap" id="wrap-futbol-fem"><canvas id="canvas-futbol-fem"></canvas></div>

<button id="btn-dl" onclick="dlCurrent()">Descargar JPG</button>

<script>
const IMG_SRC = {
  'futbol-masc': 'FIXTURE_ACTUALIZADO/Futbol Masculino.jpeg',
  'voley':       'FIXTURE_ACTUALIZADO/Voley Mixto.jpeg',
  'padel':       'FIXTURE_ACTUALIZADO/Padel.jpeg',
  'futbol-fem':  'FIXTURE_ACTUALIZADO/Futbol Femenino.jpeg'
};
const DL_NAMES = {
  'futbol-masc': 'Fixture_Futbol_Masculino_Fecha3.jpg',
  'voley':       'Fixture_Voley_Mixto_Fecha3.jpg',
  'padel':       'Fixture_Padel_Fecha3.jpg',
  'futbol-fem':  'Fixture_Futbol_Femenino_Fecha3.jpg'
};

let currentSport = 'futbol-masc';

const imgCache = {};
function loadImg(key) {
  return new Promise(resolve => {
    if (imgCache[key]) { resolve(imgCache[key]); return; }
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { imgCache[key] = img; resolve(img); };
    img.src = IMG_SRC[key];
  });
}

function switchTab(e, sport) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.canvas-wrap').forEach(w => w.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('wrap-' + sport).classList.add('active');
  currentSport = sport;
  renderSport(sport);
}

function dlCurrent() {
  const c = document.getElementById('canvas-' + currentSport);
  const a = document.createElement('a');
  a.download = DL_NAMES[currentSport];
  a.href = c.toDataURL('image/jpeg', 0.95);
  a.click();
}

function pillPath(ctx, cx, cy, w, h) {
  const r = h/2, x = cx - w/2, y = cy - h/2;
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y,   x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x,   y+h, r);
  ctx.arcTo(x,   y+h, x,   y,   r);
  ctx.arcTo(x,   y,   x+w, y,   r);
  ctx.closePath();
}

function drawPill(ctx, text, cx, cy, sx, sy, customW, customColor, customH) {
  const pw = (customW || 130) * sx;
  const ph = (customH || 32)  * sy;
  const fs = 22 * Math.min(sx, sy);
  const color = customColor || '#ef601b';
  const rx = cx * sx, ry = cy * sy;
  ctx.save();
  ctx.fillStyle = '#000A14';
  pillPath(ctx, rx, ry, pw, ph);
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.8 * Math.min(sx, sy);
  pillPath(ctx, rx, ry, pw, ph);
  ctx.stroke();
  ctx.fillStyle = color;
  ctx.font = '600 ' + fs + 'px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, rx, ry + 1);
  ctx.restore();
}

function g(data, id, fallback) {
  return (data[id] && data[id].trim()) ? data[id].trim() : fallback;
}

async function renderSport(sport) {
  const saved = localStorage.getItem('fixture_data');
  const data  = saved ? JSON.parse(saved) : {};
  const canvas = document.getElementById('canvas-' + sport);
  const img = await loadImg(sport);
  canvas.width  = img.naturalWidth;
  canvas.height = img.naturalHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const sx = canvas.width/2133, sy = canvas.height/1600;

  if (sport === 'futbol-masc') {
    drawPill(ctx, g(data,'fm-ga','G.A'),   534, 1131, sx, sy, 172, undefined, 32);
    drawPill(ctx, g(data,'fm-gb','G.B'),   759, 1131, sx, sy, 172, undefined, 32);
    drawPill(ctx, g(data,'fm-gc','G.C'),  1372, 1131, sx, sy, 172, undefined, 32);
    drawPill(ctx, g(data,'fm-mp','M.P'),  1598, 1131, sx, sy, 172, undefined, 32);
    drawPill(ctx, g(data,'fm-g1','G1'),    953, 1174, sx, sy, 170, undefined, 32);
    drawPill(ctx, g(data,'fm-g2','G2'),   1178, 1174, sx, sy, 170, undefined, 32);
  } else if (sport === 'voley') {
    drawPill(ctx, g(data,'vl-1a','1ºA'),  748, 1075, sx, sy, 172);
    drawPill(ctx, g(data,'vl-2b','2ºB'),  970, 1075, sx, sy, 172, '#09bdd2');
    drawPill(ctx, g(data,'vl-1b','1ºB'), 1161, 1075, sx, sy, 172, '#09bdd2');
    drawPill(ctx, g(data,'vl-2a','2ºA'), 1384, 1075, sx, sy, 172);
    drawPill(ctx, g(data,'vl-f1','F1'),   750, 1118, sx, sy, 172);
    drawPill(ctx, g(data,'vl-f2','F2'),   970, 1118, sx, sy, 172);
  } else if (sport === 'padel') {
    drawPill(ctx, g(data,'pd-1a','1ºA'),  741, 1091, sx, sy, 174);
    drawPill(ctx, g(data,'pd-2b','2ºB'),  968, 1091, sx, sy, 174, '#09bdd2');
    drawPill(ctx, g(data,'pd-1b','1ºB'), 1164, 1091, sx, sy, 174, '#09bdd2');
    drawPill(ctx, g(data,'pd-2a','2ºA'), 1395, 1091, sx, sy, 174);
    drawPill(ctx, g(data,'pd-f1','F1'),   741, 1135, sx, sy, 174);
    drawPill(ctx, g(data,'pd-f2','F2'),   968, 1135, sx, sy, 174);
  } else if (sport === 'futbol-fem') {
    drawPill(ctx, g(data,'ff-1','1°'),   917, 1118, sx, sy, 175, '#09bdd2', 32);
    drawPill(ctx, g(data,'ff-2','2°'), 1209, 1118, sx, sy, 175, '#09bdd2', 32);
  }
}

function renderAll() {
  ['futbol-masc','voley','padel','futbol-fem'].forEach(s => renderSport(s));
}

// Escuchar cambios del panel en tiempo real
window.addEventListener('storage', e => {
  if (e.key === 'fixture_data') renderAll();
});

window.addEventListener('load', renderAll);
</script>
</body>
</html>

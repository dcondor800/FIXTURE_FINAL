<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixture — Copa Mundial Repsol</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
  canvas {
    display: block;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    max-width: 100vw;
    max-height: 100vh;
  }
  #btn-dl {
    position: fixed; bottom: 16px; right: 16px;
    background: rgba(0,0,0,0.6); color: #ff6b00;
    border: 1px solid #ff6b00; border-radius: 8px;
    padding: 8px 16px; font-size: 0.85rem; font-weight: 600;
    cursor: pointer; z-index: 10; font-family: 'Segoe UI', sans-serif;
  }
  #btn-dl:hover { background: #ff6b00; color: #fff; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<button id="btn-dl" onclick="dlCurrent()">Descargar JPG</button>

<script>
const IMG_SRC = {
  'futbol-masc': 'FIXTURE_ACTUALIZADO/Futbol Masculino.jpeg',
  'voley':       'FIXTURE_ACTUALIZADO/Voley Mixto.jpeg',
  'padel':       'FIXTURE_ACTUALIZADO/Padel.jpeg',
  'futbol-fem':  'FIXTURE_ACTUALIZADO/Futbol Femenino.jpeg'
};
const DL_NAMES = {
  'futbol-masc': 'Fixture_Futbol_Masculino_Fecha3.jpg',
  'voley':       'Fixture_Voley_Mixto_Fecha3.jpg',
  'padel':       'Fixture_Padel_Fecha3.jpg',
  'futbol-fem':  'Fixture_Futbol_Femenino_Fecha3.jpg'
};

let currentSport = 'futbol-masc';

const imgCache = {};
function loadImg(key) {
  return new Promise(resolve => {
    if (imgCache[key]) { resolve(imgCache[key]); return; }
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { imgCache[key] = img; resolve(img); };
    img.src = IMG_SRC[key];
  });
}

function dlCurrent() {
  const c = document.getElementById('canvas');
  const a = document.createElement('a');
  a.download = DL_NAMES[currentSport];
  a.href = c.toDataURL('image/jpeg', 0.95);
  a.click();
}

function pillPath(ctx, cx, cy, w, h) {
  const r = h / 2, x = cx - w/2, y = cy - h/2;
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y,   x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x,   y+h, r);
  ctx.arcTo(x,   y+h, x,   y,   r);
  ctx.arcTo(x,   y,   x+w, y,   r);
  ctx.closePath();
}

function drawPill(ctx, text, cx, cy, sx, sy, customW, customColor, customH) {
  const pw = (customW || 230) * sx;
  const ph = (customH || 50)  * sy;
  const fs = 36 * Math.min(sx, sy);
  const color = customColor || '#ef601b';
  const rx = cx * sx, ry = cy * sy;
  ctx.save();
  ctx.fillStyle = '#000A14';
  pillPath(ctx, rx, ry, pw, ph);
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.8 * Math.min(sx, sy);
  pillPath(ctx, rx, ry, pw, ph);
  ctx.stroke();
  ctx.fillStyle = color;
  ctx.font = '600 ' + fs + 'px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, rx, ry + 1);
  ctx.restore();
}

function g(data, id, fallback) {
  return (data[id] && data[id].trim()) ? data[id].trim() : fallback;
}

async function render(data) {
  const sport = data.sport || 'futbol-masc';
  currentSport = sport;
  const canvas = document.getElementById('canvas');
  const img = await loadImg(sport);
  canvas.width  = img.naturalWidth;
  canvas.height = img.naturalHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const sx = canvas.width/2133, sy = canvas.height/1600;

  if (sport === 'futbol-masc') {
    drawPill(ctx, g(data,'fm-ga','G.A'),   533, 1132, sx, sy, undefined, undefined, 42);
    drawPill(ctx, g(data,'fm-gb','G.B'),   758, 1132, sx, sy, undefined, undefined, 42);
    drawPill(ctx, g(data,'fm-gc','G.C'),  1370, 1132, sx, sy, undefined, undefined, 42);
    drawPill(ctx, g(data,'fm-mp','M.P'),  1596, 1132, sx, sy, undefined, undefined, 42);
    drawPill(ctx, g(data,'fm-g1','G1'),    952, 1174, sx, sy, undefined, undefined, 42);
    drawPill(ctx, g(data,'fm-g2','G2'),   1177, 1174, sx, sy, undefined, undefined, 42);
  } else if (sport === 'voley') {
    drawPill(ctx, g(data,'vl-1a','1ºA'),  744, 1076, sx, sy, 255);
    drawPill(ctx, g(data,'vl-2b','2ºB'),  974, 1076, sx, sy, 255, '#09bdd2');
    drawPill(ctx, g(data,'vl-1b','1ºB'), 1165, 1076, sx, sy, 255, '#09bdd2');
    drawPill(ctx, g(data,'vl-2a','2ºA'), 1382, 1076, sx, sy, 255);
    drawPill(ctx, g(data,'vl-f1','F1'),   746, 1119, sx, sy, 255);
    drawPill(ctx, g(data,'vl-f2','F2'),   970, 1121, sx, sy, 255);
  } else if (sport === 'padel') {
    drawPill(ctx, g(data,'pd-1a','1ºA'),  737, 1091, sx, sy, 260);
    drawPill(ctx, g(data,'pd-2b','2ºB'),  970, 1095, sx, sy, 260, '#09bdd2');
    drawPill(ctx, g(data,'pd-1b','1ºB'), 1165, 1093, sx, sy, 260, '#09bdd2');
    drawPill(ctx, g(data,'pd-2a','2ºA'), 1389, 1093, sx, sy, 260);
    drawPill(ctx, g(data,'pd-f1','F1'),   740, 1137, sx, sy, 260);
    drawPill(ctx, g(data,'pd-f2','F2'),   968, 1134, sx, sy, 260);
  } else if (sport === 'futbol-fem') {
    drawPill(ctx, g(data,'ff-1','1°'),   917, 1118, sx, sy, 310, '#09bdd2', 65);
    drawPill(ctx, g(data,'ff-2','2°'), 1209, 1118, sx, sy, 310, '#09bdd2', 65);
  }
}

function loadAndRender() {
  const saved = localStorage.getItem('fixture_data');
  if (saved) render(JSON.parse(saved));
  else render({ sport: 'futbol-masc' });
}

// Escuchar cambios del panel en tiempo real
window.addEventListener('storage', e => {
  if (e.key === 'fixture_data' && e.newValue) {
    render(JSON.parse(e.newValue));
  }
});

window.addEventListener('load', loadAndRender);
</script>
</body>
</html>
